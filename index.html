<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Day — Dec 13</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F4EE;
    --surface:#FFFFFF;
    --border:#E4E0D6;
    --text:#20241F;
    --text-soft:#5C6357;
    --green:#2F5233;
    --green-soft:#E7EEE4;
    --blue:#2B4C7E;
    --gold:#C9A227;
    --gold-soft:#F5EDCF;
    --red:#B3312C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ---- Header ---- */
  header{
    padding:28px 20px 20px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
    position:sticky;
    top:0;
    z-index:10;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-soft);
    margin:0 0 4px;
  }
  h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:44px;
    letter-spacing:0.02em;
    margin:0;
    line-height:0.95;
    color:var(--green);
  }
  .countdown{
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-top:8px;
  }
  .countdown .num{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:22px;
    color:var(--blue);
  }
  .countdown .label{
    font-size:13px;
    color:var(--text-soft);
  }

  /* ---- Overall progress ---- */
  .progress-wrap{
    padding:16px 20px 4px;
  }
  .progress-track{
    height:8px;
    border-radius:4px;
    background:var(--border);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--green);
    border-radius:4px;
    transition:width 0.3s ease;
  }
  .progress-meta{
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-soft);
    margin-top:6px;
  }

  /* ---- Course strip (signature element) ---- */
  .course{
    display:flex;
    align-items:center;
    gap:0;
    overflow-x:auto;
    padding:22px 20px 18px;
    scrollbar-width:none;
  }
  .course::-webkit-scrollbar{display:none;}
  .marker{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:30px;
    position:relative;
  }
  .marker .line{
    position:absolute;
    top:9px;
    left:-15px;
    width:30px;
    height:2px;
    background:var(--border);
    z-index:0;
  }
  .marker:first-child .line{display:none;}
  .marker.filled .line{background:var(--green);}
  .dot{
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--surface);
    border:2px solid var(--border);
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .marker.filled .dot{background:var(--green);border-color:var(--green);}
  .marker.cutback .dot{border-style:dashed;border-color:var(--gold);}
  .marker.cutback.filled .dot{background:var(--gold);border-color:var(--gold);}
  .marker.peak .dot{border-color:var(--blue);border-width:3px;}
  .marker.peak.filled .dot{background:var(--blue);border-color:var(--blue);}
  .marker.current .dot{box-shadow:0 0 0 4px var(--gold-soft);}
  .marker.race .dot{background:var(--red);border-color:var(--red);}
  .marker .wk{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    color:var(--text-soft);
    margin-top:4px;
  }

  /* ---- Weeks list ---- */
  main{padding:8px 16px 20px;}
  details{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:10px;
    overflow:hidden;
  }
  details[open]{border-color:var(--green);}
  details.current-week{border-color:var(--blue);border-width:2px;}
  summary{
    list-style:none;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  summary::-webkit-details-marker{display:none;}
  .summary-left{display:flex;align-items:center;gap:12px;}
  .wk-num{
    font-family:'Bebas Neue',sans-serif;
    font-size:26px;
    color:var(--green);
    min-width:34px;
  }
  .wk-info .wk-date{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-soft);
  }
  .wk-info .wk-phase{
    font-size:13px;
    font-weight:600;
    margin-top:1px;
  }
  .badge{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:4px 8px;
    border-radius:20px;
    background:var(--green-soft);
    color:var(--green);
    font-weight:600;
    white-space:nowrap;
  }
  .badge.done{background:var(--green);color:#fff;}
  .chevron{
    margin-left:10px;
    transition:transform 0.2s ease;
    color:var(--text-soft);
  }
  details[open] .chevron{transform:rotate(180deg);}

  .runs{
    padding:0 16px 14px;
    border-top:1px solid var(--border);
  }
  .run-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 0;
    border-bottom:1px solid var(--border);
  }
  .run-row:last-child{border-bottom:none;}
  .checkbox{
    flex:0 0 auto;
    width:24px;
    height:24px;
    border-radius:6px;
    border:2px solid var(--border);
    background:var(--surface);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .checkbox.checked{
    background:var(--green);
    border-color:var(--green);
  }
  .checkbox svg{display:none;width:14px;height:14px;stroke:#fff;stroke-width:3;}
  .checkbox.checked svg{display:block;}
  .run-row.race .checkbox.checked{background:var(--red);border-color:var(--red);}
  .run-label{flex:1;}
  .run-label .name{font-size:14px;font-weight:600;}
  .run-row.race .run-label .name{color:var(--red);}
  .run-label .name.struck{text-decoration:line-through;color:var(--text-soft);font-weight:500;}
  .run-dur{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--text-soft);
    white-space:nowrap;
  }
  .note{
    font-size:12px;
    color:var(--text-soft);
    padding-top:10px;
    line-height:1.5;
  }

  footer{
    text-align:center;
    padding:20px;
    font-size:11px;
    color:var(--text-soft);
  }
  footer button{
    background:none;
    border:1px solid var(--border);
    color:var(--text-soft);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Marathon Training · 3 Runs / Week</p>
  <h1>Race Day</h1>
  <div class="countdown">
    <span class="num mono" id="daysLeft">—</span>
    <span class="label">days to go · Sunday, Dec 13, 2026</span>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-meta">
    <span id="progressText">0 / 0 runs done</span>
    <span id="progressPct">0%</span>
  </div>
</div>

<div class="course" id="course"></div>

<main id="weeksContainer"></main>

<footer>
  Progress is saved on this device only.
  <br><br>
  <button id="resetBtn">Reset all progress</button>
</footer>

<script>
const RACE_DATE = new Date('2026-12-13T00:00:00');

const plan = [
  {w:1,  date:'2026-07-13', phase:'Base',    runs:[20,20,30]},
  {w:2,  date:'2026-07-20', phase:'Base',    runs:[20,25,40]},
  {w:3,  date:'2026-07-27', phase:'Base',    runs:[25,25,50]},
  {w:4,  date:'2026-08-03', phase:'Cutback', cutback:true, runs:[20,20,35]},
  {w:5,  date:'2026-08-10', phase:'Base',    runs:[25,30,60]},
  {w:6,  date:'2026-08-17', phase:'Base',    runs:[30,30,70]},
  {w:7,  date:'2026-08-24', phase:'Base',    runs:[30,35,80]},
  {w:8,  date:'2026-08-31', phase:'Cutback', cutback:true, runs:[25,25,55]},
  {w:9,  date:'2026-09-07', phase:'Build',   runs:[30,35,90]},
  {w:10, date:'2026-09-14', phase:'Build',   runs:[35,35,100]},
  {w:11, date:'2026-09-21', phase:'Build',   runs:[35,40,110]},
  {w:12, date:'2026-09-28', phase:'Cutback', cutback:true, runs:[30,30,80]},
  {w:13, date:'2026-10-05', phase:'Build',   runs:[35,40,120]},
  {w:14, date:'2026-10-12', phase:'Build',   runs:[40,40,135]},
  {w:15, date:'2026-10-19', phase:'Build',   runs:[40,45,150]},
  {w:16, date:'2026-10-26', phase:'Cutback', cutback:true, runs:[30,35,100]},
  {w:17, date:'2026-11-02', phase:'Peak',    runs:[40,45,165]},
  {w:18, date:'2026-11-09', phase:'Peak',    peak:true, runs:[45,45,180], note:'Longest run of the plan — about 3 hours. Run/walk the whole way if needed.'},
  {w:19, date:'2026-11-16', phase:'Taper',   runs:[35,35,120]},
  {w:20, date:'2026-11-23', phase:'Taper',   runs:[30,30,90]},
  {w:21, date:'2026-11-30', phase:'Taper',   runs:[25,20,45]},
  {w:22, date:'2026-12-07', phase:'Race Week', race:true, runs:[20,15], note:'Keep it short and easy all week. Save your legs for Sunday.'},
];

const runLabels = ['Run 1 (easy)', 'Run 2 (easy)', 'Long Run'];

function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtDur(min){
  if(min>=60){
    const h = Math.floor(min/60), m = min%60;
    return m ? `${h}h ${m}m` : `${h}h`;
  }
  return `${min} min`;
}
function weekEndDate(iso){
  const d = new Date(iso+'T00:00:00');
  d.setDate(d.getDate()+6);
  return d;
}

// ---- State ----
const STORAGE_KEY = 'marathonPlanProgress';
let state = {};
try{
  state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
}catch(e){ state = {}; }

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function isChecked(w, i){
  return !!(state[w] && state[w][i]);
}
function toggle(w, i){
  if(!state[w]) state[w] = {};
  state[w][i] = !state[w][i];
  save();
  render();
}

// ---- Current week detection ----
const today = new Date();
today.setHours(0,0,0,0);
let currentWeekNum = null;
for(const wk of plan){
  const start = new Date(wk.date+'T00:00:00');
  const end = weekEndDate(wk.date);
  if(today>=start && today<=end){ currentWeekNum = wk.w; }
}
if(currentWeekNum===null){
  if(today < new Date(plan[0].date+'T00:00:00')) currentWeekNum = plan[0].w;
  else if(today > RACE_DATE) currentWeekNum = plan[plan.length-1].w;
}

function render(){
  // Countdown
  const msLeft = RACE_DATE - today;
  const daysLeft = Math.ceil(msLeft/(1000*60*60*24));
  document.getElementById('daysLeft').textContent = daysLeft>0 ? daysLeft : (daysLeft===0 ? '0':'—');

  // Overall progress
  let total=0, done=0;
  plan.forEach(wk=>{
    wk.runs.forEach((_,i)=>{
      total++;
      if(isChecked(wk.w,i)) done++;
    });
  });
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${done} / ${total} runs done`;
  document.getElementById('progressPct').textContent = pct+'%';

  // Course strip
  const course = document.getElementById('course');
  course.innerHTML = '';
  plan.forEach(wk=>{
    const allDone = wk.runs.every((_,i)=>isChecked(wk.w,i));
    const el = document.createElement('div');
    el.className = 'marker'
      + (allDone ? ' filled':'')
      + (wk.cutback ? ' cutback':'')
      + (wk.peak ? ' peak':'')
      + (wk.race ? ' race':'')
      + (wk.w===currentWeekNum ? ' current':'');
    el.innerHTML = `<div class="line"></div><div class="dot"></div><div class="wk">${wk.race ? '🏁':wk.w}</div>`;
    course.appendChild(el);
  });

  // Weeks list
  const container = document.getElementById('weeksContainer');
  container.innerHTML = '';
  plan.forEach(wk=>{
    const doneCount = wk.runs.filter((_,i)=>isChecked(wk.w,i)).length;
    const totalCount = wk.runs.length;
    const allDone = doneCount===totalCount;

    const details = document.createElement('details');
    details.className = wk.w===currentWeekNum ? 'current-week' : '';
    if(wk.w===currentWeekNum) details.open = true;

    const phaseLabel = wk.race ? 'Race Week' : wk.phase;

    details.innerHTML = `
      <summary>
        <div class="summary-left">
          <div class="wk-num">${wk.w}</div>
          <div class="wk-info">
            <div class="wk-date mono">${fmtDate(wk.date)}${wk.race ? ' · RACE SUN DEC 13':''}</div>
            <div class="wk-phase">${phaseLabel}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;">
          <span class="badge ${allDone?'done':''}">${doneCount}/${totalCount}</span>
          <span class="chevron">▾</span>
        </div>
      </summary>
      <div class="runs">
        ${wk.runs.map((min,i)=>{
          const checked = isChecked(wk.w,i);
          const isRaceItem = wk.race && i===wk.runs.length-1 && false; // reserved
          return `
          <div class="run-row" data-w="${wk.w}" data-i="${i}">
            <div class="checkbox ${checked?'checked':''}">
              <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="run-label">
              <div class="name ${checked?'struck':''}">${runLabels[i] || 'Run'}</div>
            </div>
            <div class="run-dur mono">${fmtDur(min)}</div>
          </div>`;
        }).join('')}
        ${wk.race ? `
          <div class="run-row race" data-w="${wk.w}" data-i="race">
            <div class="checkbox ${isChecked(wk.w,'race')?'checked':''}">
              <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="run-label">
              <div class="name">🏁 Race Day — 26.2 mi</div>
            </div>
            <div class="run-dur mono">Dec 13</div>
          </div>` : ''}
        ${wk.note ? `<div class="note">${wk.note}</div>` : ''}
      </div>
    `;
    container.appendChild(details);
  });

  // wire up checkboxes
  container.querySelectorAll('.run-row').forEach(row=>{
    row.addEventListener('click', ()=>{
      const w = row.dataset.w;
      const i = row.dataset.i;
      toggle(w, i);
    });
  });
}

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('Reset all checked-off runs? This can\'t be undone.')){
    state = {};
    save();
    render();
  }
});

render();

// scroll current week's course marker into view
const currentMarker = document.querySelector('.marker.current');
if(currentMarker) currentMarker.scrollIntoView({inline:'center', block:'nearest'});
</script>

</body>
</html>
